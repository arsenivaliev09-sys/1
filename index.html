<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Alien Frontier Pixel</title>
  <style>
    html, body { margin:0; height:100%; background:#05070f; overflow:hidden; font-family:monospace; }
    canvas { width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha:false });
  const rand = (a,b)=>Math.random()*(b-a)+a;
  const keys = new Set();
  const mouse = { x:0, y:0, down:false };

  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  addEventListener('keydown', e=>keys.add(e.key.toLowerCase()));
  addEventListener('keyup', e=>keys.delete(e.key.toLowerCase()));
  canvas.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
  canvas.addEventListener('mousedown', ()=>mouse.down=true);
  canvas.addEventListener('mouseup', ()=>mouse.down=false);

  let state='menu';
  let hintText='Добро пожаловать на Frontier-9';
  const buttons = [
    {label:'Новая игра', action:()=>{ state='space'; hintText='Кликни по экзопланете для высадки'; }},
    {label:'Продолжить', action:()=>{ hintText='Сохранений пока нет'; }},
    {label:'Настройки', action:()=>{ hintText='Настройки будут добавлены позже'; }}
  ];

  const stars = Array.from({length:620},()=>({x:rand(0,1),y:rand(0,1),s:Math.floor(rand(1,4)),t:rand(0,7)}));
  const planet = {x:0.62, y:0.52, r:190};

  const world = { width:3400, height:2500, trees:[], rocks:[], mountains:[], grass:[] };
  for(let i=0;i<350;i++) world.grass.push({x:rand(0,world.width), y:rand(0,world.height), s:rand(3,7)});
  for(let i=0;i<190;i++) world.rocks.push({x:rand(50,world.width-50), y:rand(50,world.height-50), s:rand(14,34)});
  for(let i=0;i<120;i++) world.trees.push({x:rand(50,world.width-50), y:rand(50,world.height-50), c:rand(16,24)});
  for(let i=0;i<44;i++) world.mountains.push({x:rand(160,world.width-160), y:rand(160,world.height-160), w:rand(110,260), h:rand(80,180)});

  const player = {x:world.width*0.5, y:world.height*0.5, z:0, vz:0, w:22, h:58, vx:0, vy:0, phase:0, dir:1, onGround:true};
  const tasks=['принести ресурсы','помочь другим NPC','работать'];
  const npcs = Array.from({length:10},(_,i)=>({
    name:'NPC-'+(i+1), x:rand(300,world.width-300), y:rand(300,world.height-300), z:0, vz:0,
    w:22, h:58, vx:rand(-30,30), vy:rand(-30,30), phase:rand(0,9), task:'гуляет', nextAI:rand(1,3)
  }));

  const cam = { x:player.x, y:player.y, zoom:1.8, targetZoom:1.8 };

  function pxRect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(Math.floor(x),Math.floor(y),Math.max(1,Math.floor(w)),Math.max(1,Math.floor(h))); }

  function drawAlienTop(sx,sy,unit,step,bob,main){
    const u=unit;
    const legA = Math.sin(step)*2;
    const legB = Math.sin(step+Math.PI)*2;
    pxRect(sx-2*u, sy-9*u-bob, 4*u, 3*u, '#1f7f3f');
    pxRect(sx-4*u, sy-6*u-bob, 8*u, 8*u, main);
    pxRect(sx-2*u, sy+2*u-bob, 4*u, 5*u, '#289a4f');
    pxRect(sx-6*u+legA, sy+3*u-bob, 3*u, 7*u, '#2db75a');
    pxRect(sx+3*u-legA, sy+3*u-bob, 3*u, 7*u, '#2db75a');
    pxRect(sx-3*u+legB, sy+8*u-bob, 2*u, 6*u, '#1b6f37');
    pxRect(sx+1*u-legB, sy+8*u-bob, 2*u, 6*u, '#1b6f37');
    pxRect(sx-5*u, sy-2*u-bob, 2*u, 6*u, '#2ea657');
    pxRect(sx+3*u, sy-2*u-bob, 2*u, 6*u, '#2ea657');
    pxRect(sx-2*u, sy-5*u-bob, 2*u, 2*u, '#e4fff6');
    pxRect(sx+0*u, sy-5*u-bob, 2*u, 2*u, '#e4fff6');
    pxRect(sx-1*u, sy-4*u-bob, 1*u, 1*u, '#081510');
    pxRect(sx+1*u, sy-4*u-bob, 1*u, 1*u, '#081510');
  }

  function drawSpace(t){
    pxRect(0,0,canvas.width,canvas.height,'#05070f');
    for(const s of stars){
      const b=Math.floor(120 + (Math.sin(t*0.001+s.t)*0.5+0.5)*120);
      pxRect(s.x*canvas.width,s.y*canvas.height,s.s,s.s,`rgb(${b},${b},${b+20})`);
    }
  }

  function drawPlanet(cx,cy,r){
    for(let y=-r;y<=r;y+=3){
      for(let x=-r;x<=r;x+=3){
        const d=Math.hypot(x,y); if(d>r) continue;
        let col=[18,44,84];
        const n=Math.sin((x+40)*0.07)*Math.cos((y-20)*0.06)+Math.sin((x-y)*0.025);
        if(n>0.35) col=[28,70,42];
        if(n>0.55) col=[20,55,34];
        if(n<-0.35) col=[14,34,72];
        const shade=0.5+0.5*(1-d/r);
        pxRect(cx+x,cy+y,3,3,`rgb(${Math.floor(col[0]*shade)},${Math.floor(col[1]*shade)},${Math.floor(col[2]*shade+45*(1-d/r))})`);
      }
    }
    for(let a=0;a<360;a+=4){
      const ar=a*Math.PI/180;
      pxRect(cx+Math.cos(ar)*r*1.02,cy+Math.sin(ar)*r*1.02,2,2,'#84a7ff');
    }
  }

  function w2s(x,y){
    const ox=(mouse.x/canvas.width-0.5)*60, oy=(mouse.y/canvas.height-0.5)*45;
    return { x:(x-cam.x-ox)*cam.zoom+canvas.width/2, y:(y-cam.y-oy)*cam.zoom+canvas.height/2 };
  }

  function drawWorld(){
    pxRect(0,0,canvas.width,canvas.height,'#0a1320');
    for(let i=0;i<170;i++) pxRect((i*173)%canvas.width,(i*67)%Math.floor(canvas.height*0.6),2,2,'#20374f');

    for(const g of world.grass){ const p=w2s(g.x,g.y); pxRect(p.x,p.y,g.s*cam.zoom,1,'#2a7b32'); }

    for(const m of world.mountains){
      const p=w2s(m.x,m.y);
      pxRect(p.x-m.w*0.45*cam.zoom,p.y-m.h*0.5*cam.zoom,m.w*0.9*cam.zoom,m.h*cam.zoom,'#2a3948');
      pxRect(p.x-m.w*0.25*cam.zoom,p.y-m.h*0.28*cam.zoom,m.w*0.5*cam.zoom,m.h*0.55*cam.zoom,'#43596a');
    }

    for(const r of world.rocks){
      const p=w2s(r.x,r.y);
      pxRect(p.x-r.s*0.5*cam.zoom,p.y-r.s*0.32*cam.zoom,r.s*cam.zoom,r.s*0.64*cam.zoom,'#4f5a66');
      pxRect(p.x-r.s*0.22*cam.zoom,p.y-r.s*0.15*cam.zoom,r.s*0.3*cam.zoom,r.s*0.22*cam.zoom,'#73808d');
    }

    for(const t of world.trees){
      const p=w2s(t.x,t.y);
      const c=t.c*cam.zoom;
      pxRect(p.x-c*0.12,p.y-c*0.55,c*0.24,c*0.55,'#3c2819');
      for(let i=0;i<6;i++){
        const yy=i*c*0.09;
        pxRect(p.x-c*0.5+((i%2)*2),p.y-c*0.55+yy,c*1.0-i*c*0.1,c*0.11,i%2?'#2d8238':'#3f9e4b');
      }
    }
  }

  function applyBounds(c){ c.x=Math.max(0,Math.min(world.width,c.x)); c.y=Math.max(0,Math.min(world.height,c.y)); }

  function updateActor(a,dt,isPlayer=false){
    if(isPlayer){
      let dx=0,dy=0;
      if(keys.has('a')||keys.has('arrowleft')) dx-=1;
      if(keys.has('d')||keys.has('arrowright')) dx+=1;
      if(keys.has('w')||keys.has('arrowup')) dy-=1;
      if(keys.has('s')||keys.has('arrowdown')) dy+=1;
      const len=Math.hypot(dx,dy)||1;
      a.vx=(dx/len)*130; a.vy=(dy/len)*130;
      if(dx!==0) a.dir=Math.sign(dx);
      if((keys.has(' ')||keys.has('space'))&&a.onGround){ a.vz=170; a.onGround=false; }
    } else {
      a.nextAI-=dt;
      if(a.nextAI<=0){ a.vx=rand(-40,40); a.vy=rand(-40,40); a.nextAI=rand(1,3.8); }
    }

    a.x += a.vx*dt; a.y += a.vy*dt; applyBounds(a);
    a.vz -= 450*dt; a.z += a.vz*dt;
    if(a.z<=0){ a.z=0; a.vz=0; a.onGround=true; }
    a.phase += dt*(Math.hypot(a.vx,a.vy)>8 ? 9 : 2);
  }

  function drawUI(){
    const x=20, y=canvas.height-88, w=Math.min(700,canvas.width-40), h=68;
    pxRect(x,y,w,h,'#111a2a'); pxRect(x+4,y+4,w-8,h-8,'#22344a'); pxRect(x+8,y+8,w-16,h-16,'#0c121d');
    ctx.fillStyle='#a8d6ff'; ctx.font='16px monospace'; ctx.fillText(hintText,x+18,y+31);
    ctx.fillStyle='#83aac8'; ctx.fillText('WASD/Стрелки — ходьба | Space — прыжок | E — задание NPC | +/- — зум',x+18,y+53);
  }

  function updateSurface(dt){
    updateActor(player,dt,true);
    for(const n of npcs){
      updateActor(n,dt,false);
      if(Math.hypot(n.x-player.x,n.y-player.y)<95 && keys.has('e')){ n.task=tasks[(Math.random()*tasks.length)|0]; hintText=`${n.name}: ${n.task}`; }
    }
    if(keys.has('+')||keys.has('=')) cam.targetZoom=Math.min(3.2,cam.targetZoom+1.5*dt);
    if(keys.has('-')||keys.has('_')) cam.targetZoom=Math.max(1.0,cam.targetZoom-1.5*dt);
    cam.x += (player.x-cam.x)*0.08; cam.y += (player.y-cam.y)*0.08; cam.zoom += (cam.targetZoom-cam.zoom)*0.08;
  }

  function drawMenu(t){
    drawSpace(t);
    ctx.fillStyle='#8db2ff'; ctx.font='bold 46px monospace'; ctx.fillText('ALIEN FRONTIER',canvas.width/2-190,120);
    buttons.forEach((b,i)=>{
      const bw=280,bh=54,bx=canvas.width/2-bw/2,by=220+i*84;
      const hov=mouse.x>bx&&mouse.x<bx+bw&&mouse.y>by&&mouse.y<by+bh;
      pxRect(bx,by,bw,bh,hov?'#3f5f9d':'#223354'); pxRect(bx+4,by+4,bw-8,bh-8,hov?'#1a2744':'#121d33');
      ctx.fillStyle=hov?'#d3ecff':'#9fc4ff'; ctx.font='24px monospace'; ctx.fillText(b.label,bx+52,by+34);
      if(mouse.down&&hov){ b.action(); mouse.down=false; }
    });
  }

  function drawSurface(){
    drawWorld();
    const ps=w2s(player.x,player.y); drawAlienTop(ps.x,ps.y,Math.max(1,Math.floor(1.2*cam.zoom)),player.phase,player.z*0.07,'#35c35e');
    for(const n of npcs){ const ns=w2s(n.x,n.y); drawAlienTop(ns.x,ns.y,Math.max(1,Math.floor(1.2*cam.zoom)),n.phase,n.z*0.07,'#2cab52'); }
    drawUI();
  }

  let last=performance.now();
  function loop(now){
    const dt=Math.min(0.033,(now-last)/1000); last=now;
    if(state==='menu') drawMenu(now);
    if(state==='space'){
      drawSpace(now); drawPlanet(canvas.width*planet.x,canvas.height*planet.y,planet.r); drawUI();
      const dx=mouse.x-canvas.width*planet.x,dy=mouse.y-canvas.height*planet.y;
      if(mouse.down && dx*dx+dy*dy<planet.r*planet.r){ state='surface'; mouse.down=false; hintText='Высадка: вид со спутника. Исследуй материк.'; }
    }
    if(state==='surface'){ updateSurface(dt); drawSurface(); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
