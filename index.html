<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exoplanet Frontier</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#02030b; font-family: 'Segoe UI', Tahoma, sans-serif; }
    canvas { display:block; width:100vw; height:100vh; cursor: crosshair; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const state = {
    mode: 'space', // space, zooming, surface
    zoom: 1,
    targetZoom: 1,
    cameraX: 0,
    cameraY: 0,
    targetCameraX: 0,
    targetCameraY: 0,
    transition: 0,
    time: 0,
    width: 0,
    height: 0,
    resources: { energy: 0, minerals: 0 },
    techLevel: 0,
    message: 'Кликните по экзопланете, чтобы приблизиться',
    messageTimer: 6,
  };

  const keys = new Set();
  const mouse = { x: 0, y: 0, down: false };

  const stars = [];
  const starLayers = [
    { count: 180, speed: 10, size: [0.5, 1.4], alpha: [0.2, 0.5] },
    { count: 120, speed: 20, size: [0.8, 2.2], alpha: [0.3, 0.7] },
    { count: 70, speed: 35, size: [1.2, 3.0], alpha: [0.5, 0.95] }
  ];

  const planet = { x: 0, y: 0, r: 145 };

  const world = {
    w: 3200,
    h: 2200,
    deposits: [],
    npcs: [],
    explored: new Set(),
  };

  const player = {
    x: world.w / 2,
    y: world.h / 2,
    r: 10,
    speed: 180,
    vx: 0,
    vy: 0,
  };

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    state.width = canvas.width;
    state.height = canvas.height;
    planet.x = canvas.width * 0.5;
    planet.y = canvas.height * 0.5;
    state.cameraX = player.x;
    state.cameraY = player.y;

    if (!stars.length) {
      starLayers.forEach((layer, layerIndex) => {
        for (let i = 0; i < layer.count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: layerIndex,
            size: rand(layer.size[0], layer.size[1]),
            alpha: rand(layer.alpha[0], layer.alpha[1]),
            twinkle: rand(0.5, 2.0),
          });
        }
      });
    }
  }

  function initWorld() {
    for (let i = 0; i < 45; i++) {
      world.deposits.push({
        x: rand(120, world.w - 120),
        y: rand(120, world.h - 120),
        type: Math.random() < 0.5 ? 'energy' : 'minerals',
        amount: Math.floor(rand(20, 80)),
        pulse: Math.random() * Math.PI * 2,
      });
    }

    const npcTypes = ['friendly', 'neutral', 'scientist'];
    for (let i = 0; i < 26; i++) {
      const type = npcTypes[Math.floor(Math.random() * npcTypes.length)];
      world.npcs.push({
        x: rand(100, world.w - 100),
        y: rand(100, world.h - 100),
        type,
        radius: 14,
        phase: rand(0, Math.PI * 2),
        helped: false,
      });
    }
  }

  function setMessage(msg, duration = 3.5) {
    state.message = msg;
    state.messageTimer = duration;
  }

  function worldToScreen(wx, wy) {
    return {
      x: (wx - state.cameraX) + canvas.width / 2,
      y: (wy - state.cameraY) + canvas.height / 2,
    };
  }

  function screenToWorld(sx, sy) {
    return {
      x: sx - canvas.width / 2 + state.cameraX,
      y: sy - canvas.height / 2 + state.cameraY,
    };
  }

  function drawSpace(dt) {
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#05081a');
    g.addColorStop(1, '#02030b');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    stars.forEach(s => {
      const layer = starLayers[s.z];
      s.y += layer.speed * dt;
      if (s.y > canvas.height + 4) {
        s.y = -4;
        s.x = Math.random() * canvas.width;
      }
      const tw = 0.5 + 0.5 * Math.sin(state.time * s.twinkle + s.x * 0.01);
      ctx.globalAlpha = s.alpha * (0.6 + tw * 0.5);
      ctx.fillStyle = s.z === 2 ? '#d6ebff' : '#cfd9ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    drawPlanet(planet.x, planet.y, planet.r * state.zoom);

    ctx.fillStyle = 'rgba(135, 190, 255, 0.9)';
    ctx.font = '16px Segoe UI';
    ctx.fillText('Галактическая карта: центр — живая экзопланета', 20, 30);
  }

  function drawPlanet(x, y, r) {
    const glow = ctx.createRadialGradient(x, y, r * 0.6, x, y, r * 1.6);
    glow.addColorStop(0, 'rgba(37, 114, 255, 0.05)');
    glow.addColorStop(1, 'rgba(80, 170, 255, 0.25)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y, r * 1.6, 0, Math.PI * 2); ctx.fill();

    const base = ctx.createRadialGradient(x - r * 0.3, y - r * 0.35, r * 0.2, x, y, r);
    base.addColorStop(0, '#5cc1ff');
    base.addColorStop(0.45, '#247cd8');
    base.addColorStop(1, '#113d74');
    ctx.fillStyle = base;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();

    for (let i = 0; i < 8; i++) {
      const a = state.time * 0.08 + i * 1.2;
      const cx = x + Math.cos(a) * r * rand(0.15, 0.45);
      const cy = y + Math.sin(a * 1.3) * r * rand(0.1, 0.45);
      const rx = r * rand(0.22, 0.42);
      const ry = r * rand(0.12, 0.24);
      ctx.fillStyle = `rgba(${60 + i*10}, ${160 + i*8}, ${90 + i*4}, 0.72)`;
      ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, a, 0, Math.PI * 2); ctx.fill();
    }

    for (let i = 0; i < 6; i++) {
      ctx.strokeStyle = 'rgba(70, 180, 255, 0.7)';
      ctx.lineWidth = r * 0.03;
      ctx.beginPath();
      const offset = i * r * 0.12 - r * 0.32;
      ctx.moveTo(x - r * 0.5, y + offset);
      ctx.quadraticCurveTo(x + r * 0.1, y + offset + r * 0.18, x + r * 0.55, y + offset - r * 0.08);
      ctx.stroke();
    }

    const shade = ctx.createRadialGradient(x + r * 0.15, y + r * 0.15, r * 0.2, x + r * 0.45, y + r * 0.45, r);
    shade.addColorStop(0, 'rgba(0,0,0,0)'); shade.addColorStop(1, 'rgba(3,8,18,0.48)');
    ctx.fillStyle = shade;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  }

  function drawSurface(dt) {
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#0b1022'); bg.addColorStop(1, '#0a1613');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Terrain grid / biomes
    const cell = 120;
    const startX = Math.floor((state.cameraX - canvas.width / 2) / cell) * cell;
    const startY = Math.floor((state.cameraY - canvas.height / 2) / cell) * cell;
    for (let x = startX; x < state.cameraX + canvas.width / 2 + cell; x += cell) {
      for (let y = startY; y < state.cameraY + canvas.height / 2 + cell; y += cell) {
        const s = worldToScreen(x, y);
        const n = (Math.sin(x * 0.006) + Math.cos(y * 0.008)) * 0.5;
        const hue = 130 + n * 25;
        ctx.fillStyle = `hsla(${hue}, 40%, ${18 + n * 8}%, 0.8)`;
        ctx.fillRect(s.x, s.y, cell + 1, cell + 1);
      }
    }

    world.deposits.forEach(d => {
      if (d.amount <= 0) return;
      d.pulse += dt * 2;
      const s = worldToScreen(d.x, d.y);
      const color = d.type === 'energy' ? '#6ff7ff' : '#97b3ff';
      const rr = 9 + Math.sin(d.pulse) * 1.8;
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.arc(s.x, s.y, rr, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.25;
      ctx.beginPath(); ctx.arc(s.x, s.y, rr * 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    });

    world.npcs.forEach(npc => {
      const s = worldToScreen(npc.x, npc.y);
      npc.phase += dt;
      const bob = Math.sin(npc.phase * 2) * 1.8;
      let c = '#8ecf9d';
      if (npc.type === 'neutral') c = '#c7d0db';
      if (npc.type === 'scientist') c = '#bca2ff';

      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(s.x, s.y + bob, npc.radius, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#08111f';
      ctx.beginPath(); ctx.arc(s.x - 4, s.y + bob - 2, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x + 4, s.y + bob - 2, 2, 0, Math.PI * 2); ctx.fill();
    });

    // Player
    const p = worldToScreen(player.x, player.y);
    ctx.fillStyle = '#5bff83';
    ctx.beginPath(); ctx.ellipse(p.x, p.y, player.r * 0.9, player.r * 1.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#05220d';
    ctx.beginPath(); ctx.arc(p.x - 3, p.y - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x + 3, p.y - 2, 2, 0, Math.PI * 2); ctx.fill();

    drawHUD();
  }

  function drawHUD() {
    ctx.fillStyle = 'rgba(4, 10, 22, 0.75)';
    ctx.fillRect(12, 12, 330, 118);
    ctx.strokeStyle = 'rgba(110, 190, 255, 0.55)';
    ctx.strokeRect(12, 12, 330, 118);

    ctx.fillStyle = '#a9d7ff';
    ctx.font = '15px Segoe UI';
    ctx.fillText(`Энергия: ${state.resources.energy}`, 26, 40);
    ctx.fillText(`Минералы: ${state.resources.minerals}`, 26, 64);
    ctx.fillText(`Технологии: ${state.techLevel}`, 26, 88);
    ctx.fillStyle = '#9fdcb2';
    ctx.fillText('WASD / стрелки: движение | Клик: взаимодействие', 26, 112);

    if (state.messageTimer > 0) {
      ctx.fillStyle = 'rgba(8, 18, 30, 0.8)';
      const w = Math.min(canvas.width - 40, 760);
      const x = canvas.width / 2 - w / 2;
      ctx.fillRect(x, canvas.height - 66, w, 44);
      ctx.strokeStyle = 'rgba(130,200,255,0.45)';
      ctx.strokeRect(x, canvas.height - 66, w, 44);
      ctx.fillStyle = '#d5edff';
      ctx.font = '16px Segoe UI';
      ctx.fillText(state.message, x + 16, canvas.height - 38);
    }
  }

  function updateSurface(dt) {
    let ax = 0, ay = 0;
    if (keys.has('w') || keys.has('arrowup')) ay -= 1;
    if (keys.has('s') || keys.has('arrowdown')) ay += 1;
    if (keys.has('a') || keys.has('arrowleft')) ax -= 1;
    if (keys.has('d') || keys.has('arrowright')) ax += 1;

    const mag = Math.hypot(ax, ay) || 1;
    player.vx = (ax / mag) * player.speed;
    player.vy = (ay / mag) * player.speed;

    player.x += player.vx * dt;
    player.y += player.vy * dt;
    player.x = Math.max(10, Math.min(world.w - 10, player.x));
    player.y = Math.max(10, Math.min(world.h - 10, player.y));

    state.targetCameraX = player.x;
    state.targetCameraY = player.y;
    state.cameraX += (state.targetCameraX - state.cameraX) * Math.min(1, dt * 6);
    state.cameraY += (state.targetCameraY - state.cameraY) * Math.min(1, dt * 6);

    world.explored.add(`${Math.floor(player.x/120)},${Math.floor(player.y/120)}`);

    if (state.messageTimer > 0) state.messageTimer -= dt;
  }

  function onClick() {
    if (state.mode === 'space') {
      const dx = mouse.x - planet.x;
      const dy = mouse.y - planet.y;
      if (Math.hypot(dx, dy) <= planet.r * state.zoom) {
        state.mode = 'zooming';
        state.targetZoom = 3.2;
        state.transition = 0;
        setMessage('Переход на поверхность планеты...', 2.2);
      }
    } else if (state.mode === 'surface') {
      const w = screenToWorld(mouse.x, mouse.y);
      // gather deposits
      for (const d of world.deposits) {
        if (d.amount <= 0) continue;
        if (Math.hypot(d.x - w.x, d.y - w.y) < 22 && Math.hypot(d.x - player.x, d.y - player.y) < 60) {
          const mined = Math.min(d.amount, 12 + state.techLevel * 2);
          d.amount -= mined;
          if (d.type === 'energy') state.resources.energy += mined;
          else state.resources.minerals += mined;
          setMessage(`Добыто ${mined} ед. ${d.type === 'energy' ? 'энергии' : 'минералов'}`);
          return;
        }
      }

      for (const npc of world.npcs) {
        if (Math.hypot(npc.x - w.x, npc.y - w.y) < npc.radius + 8 && Math.hypot(npc.x - player.x, npc.y - player.y) < 82) {
          interactNPC(npc);
          return;
        }
      }
      setMessage('Ничего интересного. Исследуйте дальше.');
    }
  }

  function interactNPC(npc) {
    if (npc.type === 'friendly') {
      const giftE = Math.floor(rand(6, 20));
      const giftM = Math.floor(rand(4, 16));
      state.resources.energy += giftE;
      state.resources.minerals += giftM;
      setMessage(`Дружелюбный инопланетянин помог: +${giftE} энергии, +${giftM} минералов`);
    } else if (npc.type === 'neutral') {
      if (!npc.helped && Math.random() < 0.4) {
        npc.helped = true;
        state.resources.energy += 10;
        setMessage('Нейтральный наблюдатель поделился данными: +10 энергии');
      } else {
        setMessage('Нейтральный инопланетянин внимательно наблюдает за вами.');
      }
    } else {
      if (state.resources.minerals >= 25) {
        state.resources.minerals -= 25;
        state.techLevel += 1;
        setMessage('Учёный улучшил ваш модуль добычи! Технологии +1');
      } else {
        setMessage('Учёный: принесите 25 минералов для технологического апгрейда.');
      }
    }
  }

  function loop(ts) {
    if (!loop.last) loop.last = ts;
    const dt = Math.min(0.033, (ts - loop.last) / 1000);
    loop.last = ts;
    state.time += dt;

    if (state.mode === 'space') {
      drawSpace(dt);
    } else if (state.mode === 'zooming') {
      state.zoom += (state.targetZoom - state.zoom) * Math.min(1, dt * 1.8);
      state.transition += dt;
      drawSpace(dt);
      if (Math.abs(state.zoom - state.targetZoom) < 0.04 || state.transition > 2.6) {
        state.mode = 'surface';
        state.zoom = 1;
        state.cameraX = player.x;
        state.cameraY = player.y;
        setMessage('Высадка завершена. Собирайте ресурсы и взаимодействуйте с NPC!', 5);
      }
    } else {
      updateSurface(dt);
      drawSurface(dt);
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', e => keys.add(e.key.toLowerCase()));
  window.addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });
  canvas.addEventListener('mousedown', () => mouse.down = true);
  canvas.addEventListener('mouseup', () => mouse.down = false);
  canvas.addEventListener('click', onClick);

  resize();
  initWorld();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
