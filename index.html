<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>НевКонтакте</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-icon">НВ</div>
          <span class="brand-text">НевКонтакте</span>
        </div>

        <label class="searchbar" for="global-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
          </svg>
          <input id="global-search" type="search" placeholder="Поиск" />
        </label>

        <div class="top-actions">
          <button class="icon-btn" aria-label="Чаты">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5H7l-4 3v-5.5A8.5 8.5 0 1 1 21 11.5z"></path>
            </svg>
          </button>
          <button class="icon-btn" aria-label="Уведомления">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <path d="M15 17H5.8a1.8 1.8 0 0 1-1.8-1.8V14a3 3 0 0 1 1.2-2.4l1-.8V8a6 6 0 1 1 12 0v2.8l1 .8A3 3 0 0 1 20.4 14v1.2a1.8 1.8 0 0 1-1.8 1.8H15"></path>
              <path d="M9.5 18a2.5 2.5 0 0 0 5 0"></path>
            </svg>
          </button>
          <div class="avatar" aria-label="Профиль пользователя">АИ</div>
        </div>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <button class="nav-item active" data-page="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="12" cy="8" r="3.8"></circle>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0"></path>
            </svg>
            <span>Моя страница</span>
          </button>
          <button class="nav-item" data-page="chats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <path d="M20 11.5a8.5 8.5 0 0 1-8.5 8.5H7l-4 3v-5.5A8.5 8.5 0 1 1 20 11.5z"></path>
            </svg>
            <span>Чаты</span>
          </button>
          <button class="nav-item" data-page="channels">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <path d="M2.5 8.5a14 14 0 0 1 13 13"></path>
              <path d="M2.5 3.5a19 19 0 0 1 18 18"></path>
              <circle cx="6" cy="18" r="2.5"></circle>
            </svg>
            <span>Каналы</span>
          </button>
          <button class="nav-item" data-page="contacts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
              <circle cx="12" cy="8" r="3.8"></circle>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0"></path>
            </svg>
            <span>Контакты</span>
          </button>
        </aside>

        <main class="content">
          <section class="page active" id="profile-page">
            <article class="card profile-card">
              <div class="profile-row">
                <div class="profile-avatar">АИ</div>
                <div>
                  <h1>Анастасия Иванова</h1>
                  <p class="muted">@anastasia.nev</p>
                </div>
                <button class="edit-btn">Редактировать профиль</button>
              </div>
              <div class="description-block">
                <h2>Описание</h2>
                <p id="auto-description"></p>
              </div>
            </article>
          </section>

          <section class="page" id="chats-page">
            <div class="chat-layout">
              <aside class="chat-list card">
                <h2>Диалоги</h2>
                <button class="chat-item active" data-chat="irina">
                  <div>
                    <strong>Ирина</strong>
                    <p>Встречаемся в 19:00?</p>
                  </div>
                  <button class="mini-call" aria-label="Позвонить Ирине">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                      <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.4 19.4 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.6a16 16 0 0 0 6.3 6.3l1.2-1.2a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"></path>
                    </svg>
                  </button>
                </button>
                <button class="chat-item" data-chat="maksim">
                  <div>
                    <strong>Максим</strong>
                    <p>Скинь макет, пожалуйста</p>
                  </div>
                  <button class="mini-call" aria-label="Позвонить Максиму">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                      <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.4 19.4 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.6a16 16 0 0 0 6.3 6.3l1.2-1.2a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"></path>
                    </svg>
                  </button>
                </button>
              </aside>

              <section class="chat-window card">
                <header class="chat-header">
                  <div>
                    <h3 id="chat-title">Ирина</h3>
                    <p class="muted">в сети</p>
                  </div>
                  <button class="icon-btn" aria-label="Позвонить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
                      <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.4 19.4 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.4 2.1L8 9.6a16 16 0 0 0 6.3 6.3l1.2-1.2a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6A2 2 0 0 1 22 16.9z"></path>
                    </svg>
                  </button>
                </header>

                <div class="messages" id="messages"></div>

                <form class="composer" id="composer">
                  <input id="message-input" type="text" placeholder="Напишите сообщение..." required />
                  <button type="submit" class="send-btn" aria-label="Отправить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                      <path d="M22 2L11 13"></path>
                      <path d="M22 2l-7 20-4-9-9-4z"></path>
                    </svg>
                  </button>
                </form>
              </section>
            </div>
          </section>

          <section class="page placeholder" id="channels-page">
            <article class="card"><h2>Каналы</h2><p class="muted">Раздел для новостных трансляций и тематических лент.</p></article>
          </section>

          <section class="page placeholder" id="contacts-page">
            <article class="card"><h2>Контакты</h2><p class="muted">Здесь будет список людей и быстрые действия.</p></article>
          </section>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
